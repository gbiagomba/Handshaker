name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test --locked

  build-native:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # Linux x64
          - macos-latest        # macOS ARM64 (Apple Silicon)
          - windows-latest      # Windows x64
          - windows-11-arm      # Windows ARM64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --locked
      - name: Package
        shell: bash
        run: |
          set -eux
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/release/handshaker.exe "dist/handshaker-windows-${{ runner.arch }}.exe"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            cp target/release/handshaker "dist/handshaker-macos-${{ runner.arch }}"
          else
            cp target/release/handshaker "dist/handshaker-linux-${{ runner.arch }}"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: handshaker-${{ runner.os }}-${{ runner.arch }}
          path: dist/*

  build-linux-arm64:
    name: Build (ubuntu-24.04-arm)
    needs: test
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --locked
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/handshaker dist/handshaker-linux-ARM64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: handshaker-linux-ARM64
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-native, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Prepare assets
        run: |
          ls -R dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/handshaker*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
