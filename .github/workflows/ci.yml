name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test --locked

  build-linux-x64:
    name: Build (Linux x64)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: |
          mkdir -p dist
          cp target/release/handshaker dist/handshaker-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: handshaker-linux-x86_64
          path: dist/*

  build-linux-arm64:
    name: Build (Linux ARM64)
    needs: test
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: |
          mkdir -p dist
          cp target/release/handshaker dist/handshaker-linux-aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: handshaker-linux-aarch64
          path: dist/*

  build-macos-arm64:
    name: Build (macOS ARM64)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: |
          mkdir -p dist
          cp target/release/handshaker dist/handshaker-macos-aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: handshaker-macos-aarch64
          path: dist/*

  build-macos-x64:
    name: Build (macOS x64)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: cargo build --release --locked --target x86_64-apple-darwin
      - run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/handshaker dist/handshaker-macos-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: handshaker-macos-x86_64
          path: dist/*

  build-windows-x64:
    name: Build (Windows x64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - shell: bash
        run: |
          mkdir -p dist
          cp target/release/handshaker.exe dist/handshaker-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: handshaker-windows-x86_64
          path: dist/*

  build-windows-arm64:
    name: Build (Windows ARM64)
    needs: test
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - shell: bash
        run: |
          mkdir -p dist
          cp target/release/handshaker.exe dist/handshaker-windows-aarch64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: handshaker-windows-aarch64
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
      - build-macos-x64
      - build-windows-x64
      - build-windows-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List assets
        run: ls -lh dist/
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/handshaker-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
